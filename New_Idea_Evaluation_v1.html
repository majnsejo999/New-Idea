<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Đánh Giá Ý Tưởng Mới — Game Puzzle Di Động</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{--f:'Inter',system-ui,sans-serif;--bg:#f0f4f8;--card:#fff;--t1:#1e293b;--t2:#475569;--mt:#94a3b8;--bd:#e2e8f0;--bh:#cbd5e1;--go:#10b981;--go-l:#ecfdf5;--go-d:#065f46;--cd:#f59e0b;--cd-l:#fffbeb;--cd-d:#92400e;--st:#ef4444;--st-l:#fef2f2;--st-d:#991b1b;--br:#6366f1;--br-l:#eef2ff;--pp:#8b5cf6;--pp-l:#f5f3ff;--rl:14px;--rm:8px;--ss:0 1px 3px rgb(0 0 0/.06);--sm:0 4px 12px rgb(0 0 0/.08);--tr:all .2s ease}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--t1);font-size:14px;line-height:1.6;padding:1.5rem 1rem}
.container{max-width:960px;margin:0 auto}
.hdr{background:linear-gradient(135deg,#312e81,#4338ca);padding:2rem;border-radius:var(--rl);color:#fff;margin-bottom:1.5rem;box-shadow:var(--sm)}
.hdr h1{font-size:1.4rem;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hdr p{color:#c7d2fe;font-size:.85rem;line-height:1.7}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600}
.badge-p{background:rgba(139,92,246,.2);color:#c4b5fd;border:1px solid rgba(139,92,246,.3)}
.badge-g{background:rgba(16,185,129,.2);color:#6ee7b7;border:1px solid rgba(16,185,129,.3)}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:#e2e8f0;padding:4px;border-radius:var(--rm);overflow-x:auto}
.tab{font-size:11px;font-weight:600;padding:10px 6px;cursor:pointer;color:var(--t2);border-radius:var(--rm);white-space:nowrap;display:flex;align-items:center;gap:4px;transition:var(--tr);flex:1;justify-content:center}
.tab:hover:not(.active){color:var(--t1);background:rgba(255,255,255,.5)}
.tab.active{color:var(--t1);background:var(--card);box-shadow:var(--ss)}
.tab .dot{width:7px;height:7px;border-radius:50%;display:none}.tab.done .dot{display:block;background:var(--go)}
.pnl{display:none;animation:fi .2s ease}.pnl.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.prog-bar{background:var(--bd);border-radius:999px;height:8px;margin-bottom:1.5rem;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--br),var(--pp));transition:width .4s ease}
.prog-lbl{font-size:12px;color:var(--t2);font-weight:500;margin-bottom:6px;display:flex;justify-content:space-between}
.intro{padding:14px 18px;border-radius:var(--rm);margin-bottom:1.25rem;font-size:13px;line-height:1.7;border-left:4px solid var(--br);background:var(--br-l);color:#312e81}
.sec{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);margin-bottom:1rem;overflow:hidden;box-shadow:var(--ss);transition:var(--tr)}
.sec:hover{border-color:var(--bh);box-shadow:var(--sm)}
.sec-hd{display:flex;align-items:center;gap:12px;padding:14px 18px;background:#f8fafc;cursor:pointer;user-select:none}
.sec-hd:hover{background:#f1f5f9}
.sec-title{flex:1;font-size:14px;font-weight:700;color:#1e293b}
.sec-stat{font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;background:#e2e8f0;color:var(--t2)}
.chev{font-size:16px;color:var(--mt);transition:transform .2s}.chev.open{transform:rotate(180deg);color:var(--t1)}
.sec-bd{display:none;padding:8px 18px 18px}.sec-bd.open{display:block}
.qi{border-top:1px dashed var(--bd);padding:18px 0}.qi:first-child{border-top:none;padding-top:10px}
.qi-label{font-size:14px;font-weight:600;color:#334155;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag{display:inline-block;font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.tg-block{background:var(--st-l);color:var(--st-d);border:1px solid #fca5a5}
.tg-imp{background:var(--cd-l);color:var(--cd-d);border:1px solid #fde68a}
.qi-why{font-size:12px;color:#6d28d9;margin:8px 0;line-height:1.7;padding:10px 14px;background:#f5f3ff;border-radius:var(--rm);border:1px solid #e9d5ff;display:flex;align-items:flex-start;gap:6px}
.qi-why i{font-size:14px;flex-shrink:0;margin-top:2px;color:#a78bfa}.qi-why span{flex:1}
.qi-how{font-size:12px;margin:8px 0;line-height:1.7;padding:10px 14px;background:var(--go-l);border-radius:var(--rm);border-left:3px solid var(--go);color:#0f172a;display:none}
.qi-trap{font-size:12px;margin:8px 0;line-height:1.7;padding:10px 14px;background:var(--st-l);border-radius:var(--rm);border-left:3px solid var(--st);color:var(--st-d);display:none}
.toggle-row{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}
.qi-solo{font-size:12px;margin:8px 0;line-height:1.7;padding:10px 14px;background:#ecfeff;border-radius:var(--rm);border-left:3px solid #06b6d4;color:#155e75;display:none}
.tog{font-size:11px;font-weight:500;color:var(--t2);cursor:pointer;padding:4px 10px;border:1px solid var(--bd);border-radius:6px;background:var(--card);display:flex;align-items:center;gap:4px;transition:var(--tr)}
.tog:hover{background:#f1f5f9;border-color:var(--bh);color:var(--t1)}
.yn-row{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap}
.yn-btn{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--bd);background:#fff;color:var(--t2);transition:var(--tr)}
.yn-btn:hover{border-color:var(--bh)}
.yn-btn.sel-y{border-color:var(--go);background:var(--go-l);color:var(--go-d)}
.yn-btn.sel-n{border-color:var(--st);background:var(--st-l);color:var(--st-d)}
.yn-btn.sel-p{border-color:var(--cd);background:var(--cd-l);color:var(--cd-d)}
.qi-note{width:100%;font-size:12.5px;padding:8px 12px;border:1px solid var(--bd);border-radius:var(--rm);background:#f8fafc;color:var(--t1);resize:vertical;min-height:44px;font-family:var(--f);margin-top:6px}
.qi-note:focus{outline:none;border-color:var(--br);background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.qi-input{width:100%;font-size:13px;padding:8px 12px;border:1px solid var(--bd);border-radius:var(--rm);background:#fff;color:var(--t1);font-family:var(--f)}
.qi-input:focus{outline:none;border-color:var(--br);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.sl-wrap{display:flex;align-items:center;gap:12px;background:#f8fafc;padding:8px 14px;border-radius:var(--rm);border:1px solid var(--bd);margin:8px 0}
input[type=range]{-webkit-appearance:none;flex:1;height:6px;background:#e2e8f0;border-radius:999px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--br);cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.sl-lbl{font-size:11px;font-weight:600;color:var(--mt)}
.sl-val{font-size:16px;font-weight:800;min-width:24px;text-align:right;color:var(--br)}
.sel-row{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}
.sel-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:#fff;color:var(--t2);transition:var(--tr)}
.sel-btn:hover{border-color:var(--bh)}
.sel-btn.sel{border-color:var(--br);background:var(--br-l);color:var(--br)}
.verdict-pill{padding:1rem 1.25rem;border-radius:var(--rm);font-size:14px;font-weight:600;border-left:4px solid;margin:1rem 0;box-shadow:var(--ss)}
.verdict-pill.vgo{background:var(--go-l);color:var(--go-d);border-color:var(--go)}
.verdict-pill.vcd{background:var(--cd-l);color:var(--cd-d);border-color:var(--cd)}
.verdict-pill.vst{background:var(--st-l);color:var(--st-d);border-color:var(--st)}
.summary-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:2rem;box-shadow:var(--sm)}
.big-score-wrap{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:1.5rem;border-radius:var(--rl);border:1px solid var(--bd);margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.big-score{font-size:3.5rem;font-weight:800;line-height:1;letter-spacing:-.04em}
.pbar-wrap{background:#f1f5f9;border-radius:999px;height:12px;overflow:hidden;margin-bottom:1.5rem;border:1px solid var(--bd)}
.pbar{height:100%;border-radius:999px;transition:width .4s ease}
.radar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.radar-lbl{font-size:12px;font-weight:600;color:var(--t2);width:200px;flex-shrink:0}
.radar-bar-wrap{flex:1;background:#f1f5f9;border-radius:999px;height:8px;overflow:hidden;border:1px solid var(--bd)}
.radar-bar{height:100%;border-radius:999px;transition:width .4s}
.radar-val{font-size:12px;font-weight:700;min-width:36px;text-align:right}
.issue-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin:12px 0}
.issue-card{padding:12px 16px;border-radius:var(--rm);font-size:12.5px;line-height:1.6;border-left:3px solid}
.issue-card.cr{background:var(--st-l);border-color:var(--st);color:var(--st-d)}
.issue-card.wr{background:var(--cd-l);border-color:var(--cd);color:var(--cd-d)}
.issue-card.ok{background:var(--go-l);border-color:var(--go);color:var(--go-d)}
.action-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;margin-top:1rem}
.action-card{background:#f8fafc;border:1px solid var(--bd);border-radius:var(--rm);padding:1.25rem}
.action-head{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.action-body{font-size:12.5px;color:var(--t2);line-height:1.6}
.note-area{width:100%;font-size:13px;padding:12px;border:1px solid var(--bd);border-radius:var(--rm);background:#fff;color:var(--t1);resize:vertical;min-height:80px;font-family:var(--f);margin-top:1rem}
.note-area:focus{outline:none;border-color:var(--br);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.btn{font-size:12px;font-weight:600;cursor:pointer;padding:8px 16px;border:1px solid;border-radius:6px;display:inline-flex;align-items:center;gap:4px;transition:var(--tr)}
.btn-primary{background:var(--br);border-color:var(--br);color:#fff}.btn-primary:hover{background:#4f46e5}
.btn-outline{background:#fff;border-color:var(--bd);color:var(--t2)}.btn-outline:hover{background:#f1f5f9}
.btn-success{background:var(--go-l);border-color:rgba(16,185,129,.3);color:var(--go-d)}.btn-success:hover{background:#d1fae5}
.btn-danger{background:#fff;border-color:var(--bd);color:#64748b}.btn-danger:hover{background:var(--st-l);border-color:#fca5a5;color:var(--st-d)}
.export-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:1.5rem;margin-bottom:1.25rem;box-shadow:var(--ss)}
.export-card h3{font-size:15px;font-weight:700;color:#1e293b;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:12px 24px;border-radius:var(--rm);font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:999;opacity:0;transition:all .3s ease;display:flex;align-items:center;gap:8px}.save-indicator{position:fixed;top:12px;right:12px;font-size:11px;color:var(--go);background:var(--go-l);border:1px solid rgba(16,185,129,.3);padding:4px 12px;border-radius:6px;opacity:0;transition:opacity .3s;z-index:999}
.save-indicator.show{opacity:1}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:1.5rem}
.mf{background:var(--card);border:1px solid var(--bd);border-radius:var(--rm);padding:12px;box-shadow:var(--ss)}
.mf label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t2);display:block;margin-bottom:4px}
.mf input,.mf select{width:100%;border:1px solid var(--bd);border-radius:6px;padding:8px 10px;font:13px var(--f);color:var(--t1);background:#f8fafc}
.mf input:focus,.mf select:focus{outline:none;border-color:var(--br);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
</style>
</head>
<body>
<div class="container">
<header class="hdr">
<h1><i class="ti ti-bulb"></i> Đánh Giá Ý Tưởng Mới — Game Puzzle Di Động</h1>
<p>Bản đánh giá toàn diện cho ý tưởng game puzzle mới.</p>
<div class="badges">
<span class="badge badge-p"><i class="ti ti-list-check"></i> 5 phần · 13 tiêu chí chặn · Tự động chấm điểm /100</span>
<span class="badge badge-g"><i class="ti ti-target-arrow"></i> Đối tượng: Nữ ~35 tuổi </span>
</div>
</header>

<div class="meta-grid">
<div class="mf"><label>Tên ý tưởng</label><input id="m_name" placeholder="VD: Hex Color Flow" onchange="autoSave()"></div>
<div class="mf"><label>Mô tả 1 câu (core loop)</label><input id="m_desc" placeholder="Người chơi [hành động] để [mục tiêu]" onchange="autoSave()"></div>
<div class="mf"><label>Người đánh giá</label><input id="m_reviewer" onchange="autoSave()"></div>
<div class="mf"><label>Ngày</label><input type="date" id="m_date" onchange="autoSave()"></div>
</div>

<div class="prog-lbl"><span id="prog_lbl">0 / 0 câu đã trả lời</span><span id="prog_pct">0%</span></div>
<div class="prog-bar"><div class="prog-fill" id="prog_bar" style="width:0%"></div></div>

<nav class="tabs" id="tab_bar"></nav>
<div id="panels"></div>
</div>
<div class="toast" id="toast"></div>
<div class="save-indicator" id="save_ind"></div>
<script>
/* ═══════════════════════════════════════════
   DỮ LIỆU — Tất cả câu hỏi, hướng dẫn, lý do
   ═══════════════════════════════════════════ */

var A={};
var scoreState={};
function ans(id,v){A[id]=v;updateProg();markCard(id);autoSave()}
function ansNote(id,v){A[id+'_note']=v;autoSave()}
function markCard(id){var c=document.getElementById('qc_'+id);if(c){var v=A[id];c.classList.toggle('answered',v!==undefined&&v!==''&&!(Array.isArray(v)&&v.length===0))}}
function autoSave(){
 try{
  var data={A:A,scoreState:scoreState,
   meta:{m_name:document.getElementById('m_name').value,
    m_desc:document.getElementById('m_desc').value,
    m_reviewer:document.getElementById('m_reviewer').value,
    m_date:document.getElementById('m_date').value},
   savedAt:new Date().toISOString()};
  localStorage.setItem('idea_eval_v2',JSON.stringify(data));
  var ind=document.getElementById('save_ind');
  ind.textContent='✓ Đã lưu tự động — '+new Date().toLocaleTimeString('vi-VN');
  ind.classList.add('show');
  clearTimeout(window._saveTimer);
  window._saveTimer=setTimeout(function(){ind.classList.remove('show')},3000);
 }catch(e){}
}

function autoLoad(){
 try{
  var raw=localStorage.getItem('idea_eval_v2');
  if(!raw)return;
  var data=JSON.parse(raw);
  if(data.A)A=data.A;
  if(data.scoreState){scoreState=data.scoreState}
  if(data.meta){
   if(data.meta.m_name)document.getElementById('m_name').value=data.meta.m_name;
   if(data.meta.m_desc)document.getElementById('m_desc').value=data.meta.m_desc;
   if(data.meta.m_reviewer)document.getElementById('m_reviewer').value=data.meta.m_reviewer;
   if(data.meta.m_date)document.getElementById('m_date').value=data.meta.m_date;
  }
  // Restore UI states
  Object.keys(A).forEach(function(k){
   if(k.endsWith('_note')){
    // restore notes - find textarea after qc_ element
   }else{
    markCard(k);
    // Restore button highlights
    var qc=document.getElementById('qc_'+k);
    if(qc){
     var v=A[k];
     var btns=qc.querySelectorAll('.yn-btn');
     btns.forEach(function(b){
      var t=b.textContent.trim();
      if((v==='yes'&&(t==='CÓ'||t==='ĐẠT'))||(v==='no'&&(t==='KHÔNG'||t==='CHƯA ĐẠT'))||(v==='partial'&&t==='MỘT PHẦN')){
       ynHL(b);
      }
     });
     // Restore select buttons
     var selBtns=qc.querySelectorAll('.sel-btn');
     selBtns.forEach(function(b){if(b.textContent.indexOf(v)!==-1||v===b.textContent.trim()){b.classList.add('sel')}});
     // Restore textarea notes
     var ta=qc.querySelector('.qi-note');
     if(ta&&A[k+'_note'])ta.value=A[k+'_note'];
     // Restore inputs
     var inp=qc.querySelector('.qi-input');
     if(inp&&typeof v==='string')inp.value=v;
    }
  }});
  // Restore score sliders
  Object.keys(scoreState).forEach(function(k){
   var sv=document.getElementById('sv_'+k);
   if(sv)sv.textContent=scoreState[k];
   // find range input near sv_
   var wrap=sv?sv.parentElement:null;
   if(wrap){var rng=wrap.querySelector('input[type=range]');if(rng)rng.value=scoreState[k]}
  });
  updateProg();
  showToast('Đã khôi phục dữ liệu đã lưu','ti-refresh');
 }catch(e){}
}
var TABS=[
{id:'t0',title:'Thông tin',icon:'ti-user'},
{id:'t1',title:'Sàng lọc nhanh',icon:'ti-filter'},
{id:'t2',title:'Kiểm chứng',icon:'ti-circle-check'},
{id:'t3',title:'Đánh giá chi tiết',icon:'ti-clipboard-list'},
{id:'t4',title:'Tổng hợp & Xuất',icon:'ti-award'}
];

/* ── TAB 1: SÀNG LỌC NHANH (Pre-filter 5 phút) ── */
var PREFILTER=[
{id:'pf1',
 q:'Mechanic này đã có ít nhất 1 game ≥1 triệu lượt tải chứng minh chưa?',
 why:'Mechanic đã proven giảm rủi ro từ "liệu người chơi có thích không" xuống "liệu mình làm tốt hơn không". Rủi ro thấp hơn rất nhiều so với thử thứ chưa ai làm.',
 how:'<b>Cách làm:</b> Mô tả core action trong 3 từ (VD: "tap to sort") → Tìm trên AppMagic/Sensor Tower → Xem gameplay video → So sánh core action 1:1. Không cần cùng theme — chỉ cần cùng hành động chính.',
 trap:'Đừng nhầm "puzzle logic" với "match-3". Phải map đúng core action (hành động tay), không phải thể loại chung.'
},
{id:'pf2',
 q:'Thể loại game có ≥100 nghìn lượt tải/ngày toàn cầu không?',
 why:'Đây là ngưỡng tối thiểu để quảng cáo UA có đủ lượng người dùng. Dưới 100K/ngày, chi phí để có 1 người dùng cao hơn giá trị họ mang lại.',
 how:'<b>Cách làm:</b> AppMagic → Top 20 game cùng thể loại → Cộng lượt tải 30 ngày ÷ 30 = lượt tải/ngày. <b>Đạt:</b> ≥500K/ngày. <b>Cẩn thận:</b> 100K–500K. <b>Dừng:</b> <100K.',
 trap:'Lượt tải toàn cầu đẹp nhưng 70% từ thị trường Tier 3 = doanh thu thực chỉ 10–15%.'
},
{id:'pf3',
 q:'Core loop mô tả được trong 1 câu ≤15 từ không?',
 why:'Game puzzle phải hiểu trong 5 giây. Nếu core loop không nói gọn trong 1 câu, người chơi sẽ không hiểu sau 30 giây onboarding → bỏ game.',
 how:'<b>Cách làm:</b> Viết: "[Người chơi] + [hành động chính] + [mục tiêu]". Đưa câu này (không kèm hình) cho 3 người → nếu >1 người hiểu sai → cần đơn giản hóa.',
 trap:'Cần hơn 1 câu = chưa xác định đúng core. Tự hỏi: "Hành động mà người chơi làm đi làm lại 1000 lần là gì?"'
},
{id:'pf4',

function calcFinal(){

 var p1=['d1a','d1b','d1c','d1d'],p2=['d2a','d2b','d2c','d2d'],p3=['d3a','d3b','d3c','d3d'];
 var p4=['d4a','d4b','d4c','d5a','d5b'],p5=['d6a','d6c','d7a','d7b'];
 function pctOf(arr){var g=arr.reduce(function(a,id){return a+aScore(id)},0);return arr.length*4>0?g/(arr.length*4):0}
 var total=Math.round(pctOf(p1)*20+pctOf(p2)*25+pctOf(p3)*25+pctOf(p4)*15+pctOf(p5)*15);
 return {pipeline_version:'1.0',stage:'idea',idea_origin:'new',
  game_name:document.getElementById('m_name').value||'',
  core_loop:document.getElementById('m_desc').value||'',
  reviewer:document.getElementById('m_reviewer').value||'',
  date:document.getElementById('m_date').value||'',
  mechanic:A.mechanic||'',emotion:A.emotion||'',
  scores:{total:total},answers:A}
}
function exportJSON(){var d=buildExport();var j=JSON.stringify(d,null,2);document.getElementById('export_area').value=j;navigator.clipboard.writeText(j).then(function(){showToast('Đã sao chép JSON!','ti-clipboard-check')})}
function downloadJSON(){var d=buildExport();var j=JSON.stringify(d,null,2);var b=new Blob([j],{type:'application/json'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='idea_eval_'+(d.game_name||'game').replace(/[^a-zA-Z0-9]/g,'_')+'_'+d.date+'.json';a.click();URL.revokeObjectURL(u);showToast('Đã tải file!','ti-download')}
function exportText(){
 var d=buildExport();var lines=['=== ĐÁNH GIÁ Ý TƯỞNG MỚI ===','Tên: '+d.game_name,'Core loop: '+d.core_loop,'Người đánh giá: '+d.reviewer,'Ngày: '+d.date,'','Điểm tổng: '+d.scores.total+'/100'];
 document.getElementById('export_area').value=lines.join('\n');showToast('Đã tạo báo cáo','ti-file-text')}
function resetAll(){if(!confirm('Đặt lại tất cả câu trả lời về ban đầu?'))return;A={};scoreState={};localStorage.removeItem('idea_eval_v2');location.reload()}

document.getElementById('m_date').value=new Date().toISOString().slice(0,10);
updateProg();
autoLoad();
</script>
